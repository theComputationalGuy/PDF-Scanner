<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ScanPDF">
<link rel="manifest" href="manifest.json">
<title>ScanPDF</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d; --s1:#141414; --s2:#1c1c1c; --s3:#242424;
  --br:#2e2e2e; --br2:#3a3a3a;
  --gold:#bf8f3e; --gold2:#d4aa60; --gold3:#f0d090; --goldd:#6b4f22;
  --tx:#ede6d8; --txm:#a09080; --txd:#5a5040;
  --r:5px; --fd:'Cormorant Garamond',serif; --fm:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fm);font-size:13px;overflow:hidden;overscroll-behavior:none}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px 11px;border-bottom:1px solid var(--br);flex-shrink:0;background:var(--bg);z-index:20}
.logo{font-family:var(--fd);font-size:24px;font-weight:600;color:var(--gold3);letter-spacing:.02em;line-height:1}
.logo em{color:var(--gold);font-style:normal}
#doc-count{font-size:10px;color:var(--txd);letter-spacing:.1em}
.view{display:none;flex:1;overflow:hidden;flex-direction:column}
.view.active{display:flex}
nav{display:flex;border-top:1px solid var(--br);flex-shrink:0;background:var(--bg)}
nav button{flex:1;padding:11px 4px 9px;background:none;border:none;color:var(--txd);font-family:var(--fm);font-size:9px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .15s}
nav button svg{width:19px;height:19px;stroke-width:1.8}
nav button.active{color:var(--gold)}
nav button:active{opacity:.6}

/* SCAN */
#cam-wrap{position:relative;flex:1;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center}
#cam-video{width:100%;height:100%;object-fit:cover}
.cam-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;aspect-ratio:.707}
.cam-frame::before,.cam-frame::after,.cf-br,.cf-bl{content:'';position:absolute;width:20px;height:20px;border-color:var(--gold2);border-style:solid;opacity:.75}
.cam-frame::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.cam-frame::after{top:-1px;right:-1px;border-width:2px 2px 0 0}
.cf-br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.cf-bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.cam-btns{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:space-around;padding:14px 28px 18px;background:linear-gradient(transparent,rgba(0,0,0,.8))}
.btn-shutter{width:62px;height:62px;border-radius:50%;border:2.5px solid var(--gold2);background:none;cursor:pointer;position:relative;transition:transform .1s}
.btn-shutter::after{content:'';position:absolute;inset:5px;border-radius:50%;background:var(--gold2);transition:transform .12s}
.btn-shutter:active{transform:scale(.9)}
.btn-shutter:active::after{transform:scale(.85)}
.btn-round{width:42px;height:42px;border-radius:50%;border:1px solid var(--br2);background:rgba(255,255,255,.05);color:var(--tx);cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-round svg{width:18px;height:18px}
.btn-round:active{background:rgba(255,255,255,.12)}
#scan-badge{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.65);border:1px solid var(--br2);color:var(--gold2);font-size:11px;padding:4px 10px;border-radius:20px;display:none;backdrop-filter:blur(4px)}
#no-cam{display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;flex:1;padding:40px;text-align:center;color:var(--txd)}
#no-cam svg{width:44px;height:44px;opacity:.25}
#no-cam p{font-size:12px;line-height:1.6}

/* PAGE STRIP */
#strip-wrap{flex-shrink:0;background:var(--s1);border-top:1px solid var(--br);display:none;flex-direction:column}
#strip-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 14px 0}
#strip-hdr span{font-size:10px;color:var(--txd);letter-spacing:.1em;text-transform:uppercase}
#strip{display:flex;gap:10px;padding:7px 14px 9px;overflow-x:auto;-webkit-overflow-scrolling:touch}
#strip::-webkit-scrollbar{display:none}
.sthumb{flex-shrink:0;width:50px;height:70px;border-radius:3px;border:1.5px solid var(--br2);background:var(--s2);overflow:hidden;position:relative;cursor:grab}
.sthumb img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.sthumb .pn{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:9px;color:rgba(255,255,255,.7);background:rgba(0,0,0,.5);padding:1px 0}
.sthumb .dx{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(150,30,30,.85);border:none;color:#fff;font-size:10px;line-height:16px;text-align:center;cursor:pointer;display:none}
.sthumb.sdel .dx{display:block}
.sthumb.drag-over{border-color:var(--gold);transform:scale(1.06)}
.sthumb.dragging{opacity:.35}
.strip-add-btn{flex-shrink:0;width:50px;height:70px;border-radius:3px;border:1.5px dashed var(--br2);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txd)}
.strip-add-btn svg{width:20px;height:20px}
.strip-add-btn:active{border-color:var(--gold);color:var(--gold)}

/* SAVE ROW */
#save-row{display:none;flex-shrink:0;padding:9px 14px;background:var(--s1);border-top:1px solid var(--br);gap:9px;align-items:center}
#doc-name{flex:1;background:var(--s2);border:1px solid var(--br);border-radius:var(--r);color:var(--tx);font-family:var(--fm);font-size:12px;padding:9px 11px;outline:none}
#doc-name:focus{border-color:var(--goldd)}
.btn-save{padding:9px 18px;background:var(--gold);color:#0a0a0a;border:none;border-radius:var(--r);font-family:var(--fm);font-size:12px;font-weight:500;letter-spacing:.06em;cursor:pointer;white-space:nowrap}
.btn-save:active{opacity:.8}

/* CROP VIEW */
#crop-view{background:var(--bg)}
#crop-hdr{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--br);flex-shrink:0}
#crop-hdr h2{font-family:var(--fd);font-size:18px;font-weight:400;color:var(--gold3);flex:1}
#crop-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:12px;touch-action:none}
#crop-canvas{display:block;max-width:100%;max-height:100%;touch-action:none}
#crop-ftr{flex-shrink:0;display:flex;gap:10px;padding:11px 18px;border-top:1px solid var(--br);background:var(--bg)}

/* LIBRARY */
#library-view{overflow:hidden}
.lib-hdr{padding:13px 18px 10px;flex-shrink:0;border-bottom:1px solid var(--br)}
.lib-hdr h2{font-family:var(--fd);font-size:20px;font-weight:400;color:var(--gold3);margin-bottom:9px}
.srch{position:relative}
.srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--txd)}
#srch-in{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:var(--r);color:var(--tx);font-family:var(--fm);font-size:12px;padding:8px 11px 8px 30px;outline:none}
#srch-in:focus{border-color:var(--goldd)}
#doc-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 40px;gap:12px;text-align:center;color:var(--txd)}
.empty svg{width:36px;height:36px;opacity:.2}
.empty p{font-size:12px;line-height:1.6}
.doc-item{display:flex;align-items:center;gap:13px;padding:12px 18px;border-bottom:1px solid var(--br);cursor:pointer;transition:background .1s}
.doc-item:active{background:var(--s1)}
.dthumb{width:36px;height:50px;background:var(--s2);border:1px solid var(--br);border-radius:3px;flex-shrink:0;overflow:hidden}
.dthumb img{width:100%;height:100%;object-fit:cover}
.dmeta{flex:1;min-width:0}
.dname{font-size:13px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.dinfo{font-size:10px;color:var(--txd);letter-spacing:.04em}
.dacts{display:flex;gap:6px;flex-shrink:0}
.iBtn{width:30px;height:30px;border-radius:var(--r);border:1px solid var(--br);background:none;color:var(--txm);cursor:pointer;display:flex;align-items:center;justify-content:center}
.iBtn svg{width:13px;height:13px}
.iBtn:active{background:var(--s2)}
.iBtn.dl:active{color:var(--gold)}
.iBtn.ed:active{color:var(--gold2)}
.iBtn.rm:active{color:#c04040;border-color:#c04040}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:50;display:none;flex-direction:column}
#modal.open{display:flex}
.mhdr{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--br);background:var(--s1);flex-shrink:0}
.mhdr h3{font-family:var(--fd);font-size:17px;font-weight:400;flex:1;color:var(--gold3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 18px;background:var(--bg);display:flex;flex-direction:column;gap:14px}
.mftr{display:flex;gap:10px;padding:11px 18px;border-top:1px solid var(--br);background:var(--s1);flex-shrink:0}
.slbl{font-size:10px;letter-spacing:.12em;color:var(--txd);text-transform:uppercase;margin-bottom:7px}
#edit-strip{display:flex;gap:9px;padding:2px 0 6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
#edit-strip::-webkit-scrollbar{display:none}
.ethumb{flex-shrink:0;width:58px;height:82px;border-radius:3px;border:1.5px solid var(--br2);background:var(--s2);overflow:hidden;position:relative;cursor:grab}
.ethumb img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.ethumb .pn{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:9px;color:rgba(255,255,255,.7);background:rgba(0,0,0,.5);padding:1px 0}
.ethumb .dx{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(150,30,30,.85);border:none;color:#fff;font-size:10px;line-height:16px;text-align:center;cursor:pointer}
.ethumb.drag-over{border-color:var(--gold)}
.ethumb.dragging{opacity:.35}
.add-btns{display:flex;gap:8px;margin-top:4px}

/* SHARED BUTTONS */
.btn-ghost{flex:1;padding:10px;background:var(--s2);color:var(--txm);border:1px solid var(--br);border-radius:var(--r);font-family:var(--fm);font-size:11px;letter-spacing:.06em;cursor:pointer}
.btn-ghost:active{background:var(--br)}
.btn-primary{flex:2;padding:10px;background:var(--gold);color:#0a0a0a;border:none;border-radius:var(--r);font-family:var(--fm);font-size:12px;font-weight:500;letter-spacing:.07em;cursor:pointer}
.btn-primary:active{opacity:.8}
.btn-danger{background:#7a2020;color:var(--tx)}
.btn-back{width:32px;height:32px;border:1px solid var(--br);background:none;border-radius:var(--r);color:var(--tx);cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-back svg{width:15px;height:15px}

/* TOAST */
#toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--s2);border:1px solid var(--br);color:var(--tx);font-family:var(--fm);font-size:12px;padding:9px 16px;border-radius:20px;white-space:nowrap;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:200}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:#2a6a3a;color:#6dbb7a}
#toast.err{border-color:#8b3a3a;color:#c06060}

/* LOADING */
#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:14px;font-size:12px;color:var(--txm);letter-spacing:.08em}
#loading.show{display:flex}
.spinner{width:32px;height:32px;border:2.5px solid var(--br);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#fi1,#fi2,#fi3{display:none}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Scan<em>PDF</em></div>
    <div id="doc-count"></div>
  </header>

  <!-- ══ SCAN VIEW ══ -->
  <div class="view active" id="scan-view">
    <div id="cam-wrap">
      <video id="cam-video" autoplay playsinline muted></video>
      <div class="cam-frame"><div class="cf-br"></div><div class="cf-bl"></div></div>
      <div id="scan-badge"></div>
      <div class="cam-btns" id="cam-btns">
        <button class="btn-round" id="btn-flip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        </button>
        <button class="btn-shutter" id="btn-shutter"></button>
        <button class="btn-round" id="btn-gallery">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
      </div>
      <div id="no-cam">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        <p>Camera unavailable.</p>
        <button class="btn-save" onclick="fi1.click()">Pick from Gallery</button>
      </div>
    </div>
    <div id="strip-wrap">
      <div id="strip-hdr">
        <span id="strip-lbl">Pages</span>
        <button class="btn-back" id="btn-clear" style="width:auto;padding:4px 10px;font-size:10px;letter-spacing:.06em;color:var(--txd)">Clear all</button>
      </div>
      <div id="strip">
        <button class="strip-add-btn" id="btn-add-more">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div id="save-row">
      <input type="text" id="doc-name" placeholder="document name…" autocomplete="off" spellcheck="false">
      <button class="btn-save" id="btn-save">Save PDF</button>
    </div>
  </div>

  <!-- ══ CROP VIEW ══ -->
  <div class="view" id="crop-view">
    <div id="crop-hdr">
      <button class="btn-back" id="btn-crop-cancel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2>Adjust Crop</h2>
    </div>
    <div id="crop-wrap"><canvas id="crop-canvas"></canvas></div>
    <div id="crop-ftr">
      <button class="btn-ghost" id="btn-crop-reset">Reset</button>
      <button class="btn-ghost" id="btn-crop-skip">Skip</button>
      <button class="btn-primary" id="btn-crop-ok">Apply</button>
    </div>
  </div>

  <!-- ══ LIBRARY VIEW ══ -->
  <div class="view" id="library-view">
    <div class="lib-hdr">
      <h2>Library</h2>
      <div class="srch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="srch-in" placeholder="Search…">
      </div>
    </div>
    <div id="doc-list"></div>
  </div>

  <nav>
    <button class="active" id="nav-scan" onclick="gotoView('scan')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Scan
    </button>
    <button id="nav-library" onclick="gotoView('library')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Library
    </button>
  </nav>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="mhdr">
    <button class="btn-back" id="modal-close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h3 id="modal-title"></h3>
  </div>
  <div class="mbody">
    <div>
      <div class="slbl">Pages — drag to reorder, × to delete</div>
      <div id="edit-strip"></div>
      <div class="add-btns">
        <button class="btn-ghost" id="m-add-cam">+ Camera</button>
        <button class="btn-ghost" id="m-add-gal">+ Gallery</button>
        <button class="btn-ghost" id="m-add-pdf">+ PDF</button>
      </div>
    </div>
    <div>
      <div class="slbl">Name</div>
      <input type="text" id="modal-name" style="width:100%;background:var(--s2);border:1px solid var(--br);border-radius:var(--r);color:var(--tx);font-family:var(--fm);font-size:13px;padding:9px 11px;outline:none">
    </div>
    <div style="font-size:11px;color:var(--txd)" id="modal-info"></div>
  </div>
  <div class="mftr">
    <button class="btn-ghost btn-danger" id="modal-del">Delete</button>
    <button class="btn-ghost" id="modal-dl">Download</button>
    <button class="btn-primary" id="modal-save">Save Changes</button>
  </div>
</div>

<div id="loading"><div class="spinner"></div><span id="load-txt">Working…</span></div>
<div id="toast"></div>
<input type="file" id="fi1" accept="image/*" multiple>
<input type="file" id="fi2" accept="image/*" multiple>
<input type="file" id="fi3" accept="application/pdf">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// ── DB ──────────────────────────────────────────────────────────
const DB_NAME='scanpdf3',STORE='docs';
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE)){
        const s=d.createObjectStore(STORE,{keyPath:'id'});
        s.createIndex('ts','createdAt');
      }
    };
    r.onsuccess=e=>{db=e.target.result;res()};
    r.onerror=e=>rej(e.target.error);
  });
}
const tx=m=>db.transaction(STORE,m).objectStore(STORE);
const dbPut=d=>new Promise((r,j)=>{const q=tx('readwrite').put(d);q.onsuccess=r;q.onerror=e=>j(e.target.error)});
const dbDel=id=>new Promise((r,j)=>{const q=tx('readwrite').delete(id);q.onsuccess=r;q.onerror=e=>j(e.target.error)});
const dbAll=()=>new Promise((r,j)=>{const q=tx('readonly').index('ts').getAll();q.onsuccess=e=>r(e.target.result.reverse());q.onerror=e=>j(e.target.error)});
const dbGet=id=>new Promise((r,j)=>{const q=tx('readonly').get(id);q.onsuccess=e=>r(e.target.result);q.onerror=e=>j(e.target.error)});

// ── UTILS ────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
let ttid;
function toast(msg,type=''){const t=$('toast');t.textContent=msg;t.className='show'+(type?' '+type:'');clearTimeout(ttid);ttid=setTimeout(()=>t.className='',2600)}
function setLoad(on,txt=''){$('loading').classList.toggle('show',on);if(txt)$('load-txt').textContent=txt}
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function fmtB(b){return b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'}
function defName(){const d=new Date();return`scan_${d.getFullYear()}_${String(d.getMonth()+1).padStart(2,'0')}_${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function loadImg(src){return new Promise((r,j)=>{const i=new Image();i.onload=()=>r(i);i.onerror=j;i.src=src})}
async function mkThumb(src){const img=await loadImg(src);const w=80,h=Math.round(80*img.height/img.width);const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);return c.toDataURL('image/jpeg',.6)}
function f2url(f){return new Promise((r,j)=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.onerror=j;rd.readAsDataURL(f)})}
function dlBlob(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(u),5000)}
async function updCount(){const d=await dbAll();$('doc-count').textContent=d.length?d.length+(d.length===1?' doc':' docs'):''}

// ── HOMOGRAPHY ──────────────────────────────────────────────────
function solveH(src,dst){
  const A=[];
  for(let i=0;i<4;i++){
    const[sx,sy]=[src[i][0],src[i][1]],[dx,dy]=[dst[i][0],dst[i][1]];
    A.push([-sx,-sy,-1,0,0,0,dx*sx,dx*sy,dx]);
    A.push([0,0,0,-sx,-sy,-1,dy*sx,dy*sy,dy]);
  }
  for(let c=0;c<8;c++){
    let mr=c;
    for(let r=c+1;r<8;r++)if(Math.abs(A[r][c])>Math.abs(A[mr][c]))mr=r;
    [A[c],A[mr]]=[A[mr],A[c]];
    const pv=A[c][c];if(Math.abs(pv)<1e-10)continue;
    for(let j=c;j<9;j++)A[c][j]/=pv;
    for(let r=0;r<8;r++){if(r===c)continue;const f=A[r][c];for(let j=c;j<9;j++)A[r][j]-=f*A[c][j]}
  }
  const h=A.map(r=>r[8]);
  return[[h[0],h[1],h[2]],[h[3],h[4],h[5]],[h[6],h[7],1]];
}
function apH(H,[x,y]){const w=H[2][0]*x+H[2][1]*y+H[2][2];return[(H[0][0]*x+H[0][1]*y+H[0][2])/w,(H[1][0]*x+H[1][1]*y+H[1][2])/w]}
function warpCanvas(sc,pts){
  const dt=(a,b)=>Math.hypot(b[0]-a[0],b[1]-a[1]);
  const W=Math.round(Math.max(dt(pts[0],pts[1]),dt(pts[3],pts[2])));
  const H=Math.round(Math.max(dt(pts[0],pts[3]),dt(pts[1],pts[2])));
  const dstP=[[0,0],[W,0],[W,H],[0,H]];
  const Hm=solveH(dstP,pts);
  const out=document.createElement('canvas');out.width=W;out.height=H;
  const ctx=out.getContext('2d');
  const id=ctx.createImageData(W,H);
  const sd=sc.getContext('2d').getImageData(0,0,sc.width,sc.height);
  const sw=sc.width,sh=sc.height;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const[sx,sy]=apH(Hm,[x,y]);
    const ix=Math.round(sx),iy=Math.round(sy);
    const di=(y*W+x)*4;
    if(ix>=0&&ix<sw&&iy>=0&&iy<sh){const si=(iy*sw+ix)*4;id.data[di]=sd.data[si];id.data[di+1]=sd.data[si+1];id.data[di+2]=sd.data[si+2];id.data[di+3]=255}
  }
  ctx.putImageData(id,0,0);return out;
}

// ── STATE ────────────────────────────────────────────────────────
let pages=[];          // {dataUrl,thumb}[]  — current scan session
let camStream=null;
let camFacing='environment';
let cropCb=null;       // {srcCanvas,scale,resolve,reject}
let editDoc=null;
let editPages=[];      // {dataUrl,thumb}[]
let editAddMode=false;

// ── VIEW ROUTER ──────────────────────────────────────────────────
function gotoView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  $(`${name}-view`).classList.add('active');
  $(`nav-${name}`)?.classList.add('active');
  if(name==='scan') startCam();
  else stopCam();
  if(name==='library') renderLib();
}
function gotoViewDirect(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $(`${name}-view`).classList.add('active');
}

// ── CAMERA ───────────────────────────────────────────────────────
async function startCam(){
  const vid=$('cam-video'),nc=$('no-cam'),cb=$('cam-btns');
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null}
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing,width:{ideal:2560},height:{ideal:1440}},audio:false});
    vid.srcObject=camStream;vid.style.display='';nc.style.display='none';cb.style.display='';
  }catch{vid.style.display='none';nc.style.display='flex';cb.style.display='none'}
}
function stopCam(){if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null}}
$('btn-flip').addEventListener('click',()=>{camFacing=camFacing==='environment'?'user':'environment';startCam()});

// ── CAPTURE ──────────────────────────────────────────────────────
async function captureFromVideo(){
  const vid=$('cam-video');
  if(!camStream||!vid.videoWidth){toast('No camera','err');return null}
  const c=document.createElement('canvas');c.width=vid.videoWidth;c.height=vid.videoHeight;
  c.getContext('2d').drawImage(vid,0,0);
  return c.toDataURL('image/jpeg',.92);
}

$('btn-shutter').addEventListener('click',async()=>{
  if(editAddMode){
    // shutter in edit-add mode
    const url=await captureFromVideo();if(!url)return;
    const pg=await cropFlow(url);
    if(pg){editPages.push(pg);renderEditStrip()}
    editAddMode=false;
    gotoViewDirect('scan');
    $('modal').classList.add('open');
    return;
  }
  const url=await captureFromVideo();if(!url)return;
  const pg=await cropFlow(url);
  if(pg){pages.push(pg);renderStrip()}
});

$('btn-gallery').addEventListener('click',()=>fi1.click());
$('btn-add-more').addEventListener('click',()=>fi1.click());

fi1.addEventListener('change',async e=>{
  const files=[...e.target.files];e.target.value='';
  for(const f of files){const url=await f2url(f);const pg=await cropFlow(url);if(pg){pages.push(pg)}}
  renderStrip();
});

// ── CROP FLOW ────────────────────────────────────────────────────
// Returns {dataUrl, thumb} or null if cancelled
function cropFlow(dataUrl){
  return new Promise(async resolve=>{
    const img=await loadImg(dataUrl);
    const wrap=$('crop-wrap');
    const canvas=$('crop-canvas');
    const maxW=wrap.clientWidth-20,maxH=wrap.clientHeight-20;
    const scale=Math.min(maxW/img.width,maxH/img.height,1);
    const dw=Math.round(img.width*scale),dh=Math.round(img.height*scale);
    canvas.width=dw;canvas.height=dh;

    // full-res source
    const srcCanvas=document.createElement('canvas');
    srcCanvas.width=img.width;srcCanvas.height=img.height;
    srcCanvas.getContext('2d').drawImage(img,0,0);

    let pts=[[0,0],[dw,0],[dw,dh],[0,dh]];
    cropCb={srcCanvas,scale,pts,resolve,img,dw,dh};
    drawCrop(canvas,img,pts,dw,dh);
    setupCropGestures(canvas,img,pts,dw,dh);
    gotoViewDirect('crop');
  });
}

function drawCrop(canvas,img,pts,dw,dh){
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,dw,dh);
  ctx.drawImage(img,0,0,dw,dh);
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,dw,dh);
  ctx.save();
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));ctx.closePath();ctx.clip();
  ctx.drawImage(img,0,0,dw,dh);ctx.restore();
  ctx.strokeStyle='rgba(212,170,96,.85)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  pts.forEach(p=>ctx.lineTo(p[0],p[1]));ctx.lineTo(pts[0][0],pts[0][1]);ctx.stroke();
  pts.forEach(p=>{
    ctx.beginPath();ctx.arc(p[0],p[1],11,0,Math.PI*2);
    ctx.fillStyle='rgba(191,143,62,.88)';ctx.fill();
    ctx.strokeStyle='rgba(240,208,144,.9)';ctx.lineWidth=1.5;ctx.stroke();
  });
}

function setupCropGestures(canvas,img,pts,dw,dh){
  let active=-1;
  const R=24;
  function getXY(e){const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return[t.clientX-r.left,t.clientY-r.top]}
  function nearest(x,y){let b=-1,bd=Infinity;pts.forEach(([px,py],i)=>{const d=Math.hypot(px-x,py-y);if(d<R&&d<bd){bd=d;b=i}});return b}
  function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
  function onS(e){e.preventDefault();const[x,y]=getXY(e);active=nearest(x,y)}
  function onM(e){
    e.preventDefault();if(active<0)return;
    const[x,y]=getXY(e);
    pts[active]=[clamp(x,0,dw),clamp(y,0,dh)];
    if(cropCb)cropCb.pts=pts;
    drawCrop(canvas,img,pts,dw,dh);
  }
  function onE(e){e.preventDefault();active=-1}
  canvas.addEventListener('touchstart',onS,{passive:false});
  canvas.addEventListener('touchmove',onM,{passive:false});
  canvas.addEventListener('touchend',onE,{passive:false});
  canvas.addEventListener('mousedown',onS);
  canvas.addEventListener('mousemove',onM);
  canvas.addEventListener('mouseup',onE);
}

$('btn-crop-reset').addEventListener('click',()=>{
  if(!cropCb)return;
  const{img,dw,dh}=cropCb;
  cropCb.pts=[[0,0],[dw,0],[dw,dh],[0,dh]];
  drawCrop($('crop-canvas'),img,cropCb.pts,dw,dh);
});

$('btn-crop-skip').addEventListener('click',async()=>{
  if(!cropCb)return;
  const{srcCanvas,resolve}=cropCb;cropCb=null;
  const url=srcCanvas.toDataURL('image/jpeg',.88);
  const thumb=await mkThumb(url);
  backFromCrop();resolve({dataUrl:url,thumb});
});

$('btn-crop-ok').addEventListener('click',async()=>{
  if(!cropCb)return;
  const{srcCanvas,pts,scale,resolve}=cropCb;cropCb=null;
  const srcPts=pts.map(([x,y])=>[x/scale,y/scale]);
  setLoad(true,'Warping…');await new Promise(r=>setTimeout(r,30));
  const warped=warpCanvas(srcCanvas,srcPts);
  const url=warped.toDataURL('image/jpeg',.88);
  const thumb=await mkThumb(url);
  setLoad(false);
  backFromCrop();resolve({dataUrl:url,thumb});
});

$('btn-crop-cancel').addEventListener('click',()=>{
  if(!cropCb)return;
  const{resolve}=cropCb;cropCb=null;
  backFromCrop();resolve(null);
});

function backFromCrop(){
  if($('modal').classList.contains('open')){
    gotoViewDirect('scan');
  } else {
    gotoView('scan');
  }
}

// ── PAGE STRIP ───────────────────────────────────────────────────
function renderStrip(){
  const strip=$('strip');
  const addBtn=$('btn-add-more');
  strip.querySelectorAll('.sthumb').forEach(e=>e.remove());
  pages.forEach((pg,i)=>{
    const d=document.createElement('div');
    d.className='sthumb';d.draggable=true;d.dataset.idx=i;
    d.innerHTML=`<img src="${pg.thumb}"><div class="pn">${i+1}</div><button class="dx">×</button>`;
    let lpt;
    d.addEventListener('touchstart',()=>{lpt=setTimeout(()=>d.classList.toggle('sdel'),480)},{passive:true});
    d.addEventListener('touchend',()=>clearTimeout(lpt),{passive:true});
    d.querySelector('.dx').addEventListener('click',e=>{e.stopPropagation();pages.splice(i,1);renderStrip()});
    d.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',i);d.classList.add('dragging')});
    d.addEventListener('dragend',()=>d.classList.remove('dragging'));
    d.addEventListener('dragover',e=>{e.preventDefault();d.classList.add('drag-over')});
    d.addEventListener('dragleave',()=>d.classList.remove('drag-over'));
    d.addEventListener('drop',e=>{
      e.preventDefault();d.classList.remove('drag-over');
      const from=parseInt(e.dataTransfer.getData('text/plain')),to=i;
      if(from===to)return;const m=pages.splice(from,1)[0];pages.splice(to,0,m);renderStrip();
    });
    strip.insertBefore(d,addBtn);
  });
  const has=pages.length>0;
  $('strip-wrap').style.display=has?'flex':'none';
  $('save-row').style.display=has?'flex':'none';
  $('scan-badge').style.display=has?'block':'none';
  $('scan-badge').textContent=pages.length+' page'+(pages.length>1?'s':'');
  $('strip-lbl').textContent=`Pages (${pages.length})`;
  if(!$('doc-name').value)$('doc-name').value=defName();
}

$('btn-clear').addEventListener('click',()=>{if(!confirm('Clear all pages?'))return;pages=[];renderStrip()});

// ── BUILD PDF ────────────────────────────────────────────────────
async function buildPDF(pgList){
  const{jsPDF}=window.jspdf;
  let pdf=null;
  for(const pg of pgList){
    const img=await loadImg(pg.dataUrl);
    const pw=210,ph=Math.round(297*img.height/img.width);
    if(!pdf)pdf=new jsPDF({orientation:pw>ph?'l':'p',unit:'mm',format:[pw,ph]});
    else pdf.addPage([pw,ph],pw>ph?'l':'p');
    pdf.addImage(pg.dataUrl,'JPEG',0,0,pw,ph,'','FAST');
  }
  return pdf;
}

// ── SAVE ─────────────────────────────────────────────────────────
$('btn-save').addEventListener('click',async()=>{
  if(!pages.length){toast('No pages','err');return}
  const name=$('doc-name').value.trim()||defName();
  setLoad(true,'Building PDF…');
  try{
    const pdf=await buildPDF(pages);
    const blob=pdf.output('blob');
    const arr=await blob.arrayBuffer();
    await dbPut({id:Date.now().toString(),name,createdAt:Date.now(),pdf:new Uint8Array(arr),size:blob.size,thumb:pages[0].thumb,pageCount:pages.length});
    dlBlob(blob,name+'.pdf');
    setLoad(false);toast('Saved & downloaded','ok');
    pages=[];$('doc-name').value='';renderStrip();updCount();
  }catch(e){setLoad(false);toast('Error: '+e.message,'err');console.error(e)}
});

// ── LIBRARY ──────────────────────────────────────────────────────
async function renderLib(q=''){
  const all=await dbAll();
  const docs=q?all.filter(d=>d.name.toLowerCase().includes(q.toLowerCase())):all;
  const list=$('doc-list');list.innerHTML='';
  if(!docs.length){
    list.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>${q?'No results.':'No documents yet.'}</p></div>`;
    return;
  }
  docs.forEach(doc=>{
    const div=document.createElement('div');div.className='doc-item';
    div.innerHTML=`<div class="dthumb">${doc.thumb?`<img src="${doc.thumb}">`:''}</div><div class="dmeta"><div class="dname">${esc(doc.name)}</div><div class="dinfo">${fmtDate(doc.createdAt)} · ${doc.pageCount}p · ${fmtB(doc.size)}</div></div><div class="dacts"><button class="iBtn dl" title="Download"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button><button class="iBtn ed" title="Edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="iBtn rm" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button></div>`;
    div.querySelector('.dl').addEventListener('click',e=>{e.stopPropagation();dlDoc(doc.id)});
    div.querySelector('.ed').addEventListener('click',e=>{e.stopPropagation();openEdit(doc.id)});
    div.querySelector('.rm').addEventListener('click',e=>{e.stopPropagation();rmDoc(doc.id,doc.name)});
    div.addEventListener('click',()=>openEdit(doc.id));
    list.appendChild(div);
  });
}
$('srch-in').addEventListener('input',e=>renderLib(e.target.value));

async function dlDoc(id){const doc=await dbGet(id);if(!doc)return;dlBlob(new Blob([doc.pdf],{type:'application/pdf'}),doc.name+'.pdf');toast('Downloaded','ok')}
async function rmDoc(id,name){if(!confirm(`Delete "${name}"?`))return;await dbDel(id);toast('Deleted');renderLib($('srch-in').value);updCount()}

// ── EDIT MODAL ───────────────────────────────────────────────────
async function pdfToImages(bytes){
  if(!window.pdfjsLib){
    await new Promise((r,j)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=r;s.onerror=j;document.head.appendChild(s)});
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const pdf=await window.pdfjsLib.getDocument({data:bytes.slice()}).promise;
  const imgs=[];
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const vp=page.getViewport({scale:1.5});
    const c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;
    await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
    const dataUrl=c.toDataURL('image/jpeg',.88);
    imgs.push({dataUrl,thumb:await mkThumb(dataUrl)});
  }
  return imgs;
}

async function openEdit(id){
  const doc=await dbGet(id);if(!doc)return;
  editDoc=doc;
  setLoad(true,'Loading pages…');
  try{editPages=await pdfToImages(doc.pdf)}catch{editPages=[]}
  setLoad(false);
  $('modal-title').textContent=doc.name;
  $('modal-name').value=doc.name;
  $('modal-info').textContent=`${fmtDate(doc.createdAt)} · ${doc.pageCount} pages · ${fmtB(doc.size)}`;
  renderEditStrip();
  $('modal').classList.add('open');
}

function renderEditStrip(){
  const strip=$('edit-strip');strip.innerHTML='';
  editPages.forEach((pg,i)=>{
    const d=document.createElement('div');d.className='ethumb';d.draggable=true;d.dataset.idx=i;
    d.innerHTML=`<img src="${pg.thumb}"><div class="pn">${i+1}</div><button class="dx">×</button>`;
    d.querySelector('.dx').addEventListener('click',e=>{e.stopPropagation();editPages.splice(i,1);renderEditStrip()});
    d.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',i);d.classList.add('dragging')});
    d.addEventListener('dragend',()=>d.classList.remove('dragging'));
    d.addEventListener('dragover',e=>{e.preventDefault();d.classList.add('drag-over')});
    d.addEventListener('dragleave',()=>d.classList.remove('drag-over'));
    d.addEventListener('drop',e=>{
      e.preventDefault();d.classList.remove('drag-over');
      const from=parseInt(e.dataTransfer.getData('text/plain')),to=i;
      if(from===to)return;const m=editPages.splice(from,1)[0];editPages.splice(to,0,m);renderEditStrip();
    });
    strip.appendChild(d);
  });
}

// add camera from modal
$('m-add-cam').addEventListener('click',()=>{
  $('modal').classList.remove('open');
  editAddMode=true;
  gotoView('scan');
});

// add gallery from modal
$('m-add-gal').addEventListener('click',()=>fi2.click());
fi2.addEventListener('change',async e=>{
  const files=[...e.target.files];e.target.value='';
  for(const f of files){
    const url=await f2url(f);
    const pg=await cropFlow(url);
    if(pg)editPages.push(pg);
  }
  renderEditStrip();
  if(!$('crop-view').classList.contains('active'))$('modal').classList.add('open');
});

// add PDF pages from modal
$('m-add-pdf').addEventListener('click',()=>fi3.click());
fi3.addEventListener('change',async e=>{
  const file=e.target.files[0];e.target.value='';if(!file)return;
  setLoad(true,'Loading PDF…');
  try{const ab=await file.arrayBuffer();const pgs=await pdfToImages(new Uint8Array(ab));editPages.push(...pgs)}
  catch{toast('Could not load PDF','err')}
  setLoad(false);renderEditStrip();
});

$('modal-close').addEventListener('click',()=>{$('modal').classList.remove('open');editDoc=null;editPages=[];editAddMode=false});
$('modal-dl').addEventListener('click',()=>{if(editDoc)dlDoc(editDoc.id)});
$('modal-del').addEventListener('click',async()=>{
  if(!editDoc)return;
  $('modal').classList.remove('open');
  await rmDoc(editDoc.id,editDoc.name);
  editDoc=null;editPages=[];
});
$('modal-save').addEventListener('click',async()=>{
  if(!editDoc||!editPages.length){toast('No pages','err');return}
  const name=$('modal-name').value.trim()||editDoc.name;
  setLoad(true,'Rebuilding PDF…');
  try{
    const pdf=await buildPDF(editPages);
    const blob=pdf.output('blob');
    const arr=await blob.arrayBuffer();
    await dbPut({...editDoc,name,pdf:new Uint8Array(arr),size:blob.size,thumb:editPages[0].thumb,pageCount:editPages.length});
    dlBlob(blob,name+'.pdf');
    setLoad(false);toast('Saved & downloaded','ok');
    $('modal').classList.remove('open');editDoc=null;editPages=[];
    renderLib($('srch-in').value);updCount();
  }catch(e){setLoad(false);toast('Error: '+e.message,'err')}
});

// ── SERVICE WORKER ───────────────────────────────────────────────
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

// ── INIT ─────────────────────────────────────────────────────────
(async()=>{await openDB();await updCount();startCam()})();
</script>
